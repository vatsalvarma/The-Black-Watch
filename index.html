<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Scrollytelling Video</title>

    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        body {
          height: 800vh;
          background: #000;
          font-family: Arial, sans-serif;
        }

        .video-container {
          position: sticky;
          top: 0;
          width: 100%;
          height: 100vh;
          overflow: hidden;
        }

        video {
          width: 100%;
          height: 100vh;
          object-fit: cover;
        }

        .text-section {
          position: absolute;
          top: 50%;
          left: 10%;
          transform: translateY(-50%);
          color: white;
          font-size: 3rem;
          opacity: 0;
          transition: opacity 0.5s ease;
        }


       #frame {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  width: 60%;        /* 🔥 control size here */
  height: auto;      /* keeps aspect ratio */

  max-height: 80vh;  /* prevents overflow */
  object-fit: contain;
}

        @media (max-width: 768px) {
  body {
    height: 400vh; /* reduce scroll length */
  }

  #frame {
    width: 90%;
    max-height: 70vh;
  }

  .text-section {
    bottom: 90%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    font-size: 1.5rem;
    width: 90%;
  }
}

    </style>
</head>
<body>

<div class="video-container">
    <img id="frame" src="stfr/ezgif-frame-001.jpg" />
    <div class="text-section" id="text">Amazing Story Begins...</div>
</div>

<script>
    const frame = document.getElementById("frame");
  const text = document.getElementById("text");

  const totalFrames = 300;

  window.addEventListener("scroll", () => {
      const scrollTop = window.scrollY;
      const maxScroll = document.body.scrollHeight - window.innerHeight;

      const scrollFraction = scrollTop / maxScroll;

      const frameIndex = Math.floor(scrollFraction * totalFrames) + 1;

     frame.src = `stfr/ezgif-frame-${String(frameIndex).padStart(3, '0')}.jpg`;

      if (scrollFraction > 0.2 && scrollFraction < 0.4) {
          text.style.opacity = 1;
          text.innerText = "ALL BLACK";
      } else if (scrollFraction >= 0.4 && scrollFraction < 0.7) {
          text.style.opacity = 1;
          text.innerText = "GLOSSY BLACK";
      } else if (scrollFraction >= 0.7) {
          text.style.opacity = 1;
          text.innerText = "ALL BLACK";
      } else {
          text.style.opacity = 0;
      }
  });
</script>

</body>
</html>
